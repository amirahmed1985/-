<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم — قبضة الدواء</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #F1F4EC;
            --ink: #22301F;
            --ink-soft: #51604C;
            --deep: #3B5C3A;
            --amber: #D98E3B;
            --clay: #A6512E;
            --line: #DDE3D2;
            --display: 'El Messiri', sans-serif;
            --body: 'Tajawal', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--paper);
            color: var(--ink);
            font-family: var(--body);
            line-height: 1.7;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-form {
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 8px 24px rgba(34, 48, 31, 0.1);
        }

        .login-form h1 {
            font-family: var(--display);
            font-size: 1.8rem;
            margin: 0 0 2rem;
            color: var(--deep);
            text-align: center;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--ink);
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--line);
            border-radius: 6px;
            font-family: var(--body);
            font-size: 1rem;
            background: var(--paper);
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: var(--amber); }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--deep);
            color: var(--paper);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover { background: var(--amber); }

        .error {
            color: var(--clay);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .admin-dashboard { display: none; }

        .admin-header {
            background: var(--deep);
            color: var(--paper);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            margin: 0;
            font-family: var(--display);
            font-size: 1.5rem;
        }

        .logout-btn {
            background: var(--amber);
            color: var(--ink);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .logout-btn:hover { opacity: 0.9; }

        .admin-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-section {
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .admin-section h2 {
            font-family: var(--display);
            color: var(--deep);
            margin-top: 0;
        }

        .order-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .order-tab {
            padding: 0.6rem 1.2rem;
            border: 2px solid var(--line);
            border-radius: 6px;
            background: transparent;
            color: var(--ink-soft);
            font-weight: 600;
            cursor: pointer;
            font-family: var(--body);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .order-tab.active {
            background: var(--deep);
            color: var(--paper);
            border-color: var(--deep);
        }

        .order-panel { display: none; }
        .order-panel.active { display: block; }

        .order-card {
            background: rgba(59,92,58,0.05);
            padding: 1.2rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            border: 1px solid rgba(59,92,58,0.1);
        }

        .order-card__top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .order-card__actions {
            display: flex;
            gap: 0.5rem;
        }

        .order-action-btn {
            padding: 0.4rem 0.9rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .order-deliver-btn { background: var(--deep); color: var(--paper); }
        .order-undo-btn { background: var(--amber); color: var(--ink); }
        .order-delete-btn { background: var(--clay); color: var(--paper); }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .cart-table th {
            background: rgba(59, 92, 58, 0.1);
            padding: 0.8rem;
            text-align: right;
            font-weight: 600;
            border-bottom: 2px solid var(--line);
            color: var(--deep);
        }

        .cart-table td {
            padding: 0.8rem;
            border-bottom: 1px solid var(--line);
        }

        .empty-message {
            text-align: center;
            color: var(--ink-soft);
            padding: 2rem;
        }

        .search-box {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--line);
            border-radius: 6px;
            font-family: var(--body);
            font-size: 1rem;
            background: var(--paper);
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--deep); }
        .search-input::placeholder { color: var(--ink-soft); }

        @media (max-width: 640px) {
            .admin-header { flex-direction: column; gap: 1rem; }
            .cart-table { font-size: 0.85rem; }
            .cart-table th, .cart-table td { padding: 0.5rem; }
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginScreen">
        <form class="login-form" id="loginForm">
            <h1>لوحة التحكم</h1>
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                <div class="error" id="errorMsg"></div>
            </div>
            <button type="submit" class="login-btn">دخول</button>
        </form>
    </div>

    <div class="admin-dashboard" id="adminDashboard">
        <div class="admin-header">
            <h1>قبضة الدواء — لوحة التحكم</h1>
            <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
        </div>

        <div class="admin-content">

            <!-- Orders Section -->
            <div class="admin-section">
                <h2>الطلبات</h2>
                <div class="order-tabs">
                    <button class="order-tab active" data-tab="pending">الطلبات الحالية</button>
                    <button class="order-tab" data-tab="delivered">الطلبات المكتملة</button>
                </div>
                <div id="pendingPanel" class="order-panel active">
                    <p class="empty-message">لا توجد طلبات</p>
                </div>
                <div id="deliveredPanel" class="order-panel">
                    <p class="empty-message">لا توجد طلبات</p>
                </div>
            </div>

            <!-- Stock Management -->
            <div class="admin-section">
                <h2>إدارة المخزون</h2>
                <div class="search-box">
                    <input type="text" class="search-input" id="stockSearch" placeholder="🔍 ابحث عن منتج...">
                </div>
                <div id="stockContents">
                    <p class="empty-message">جاري التحميل...</p>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="firebase-init.js"></script>
    <script src="admin.js"></script>
</body>
</html>
